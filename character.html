<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="./style/style.css">
    <link rel="stylesheet" href="./style/character.css">

    <title>북메이트 - 캐릭터 도감</title>
</head>
<body>

    <main>

        <!-- 상단 -->

        <header class="topBar">

            <div class="topLeft">

                <a href="./index.html">
                    <img src="./src/back.png">
                </a>

                <img src="./src/tabler_man-filled.png">

            </div>

            <h1>캐릭터 도감</h1>

            <div class="topDummy"></div>

        </header>

        <!-- 대표 캐릭터 -->

        <section class="mainCharacter">

            <h2 id="characterName">논리적 분석가</h2>

            <img
                id="mainCharacterImg"
                src="./src/characters/character1.png"
            >

            <h3 id="characterLine">
                그건 말이 안되지 않아? 네 논리에는 허점이 있어.
            </h3>

            <p id="characterDesc">
                이 캐릭터는 논리와 근거를 중시하며,
                날카로운 질문을 던집니다.
            </p>

        </section>

        <div class="divider"></div>

        <!-- 카테고리 헤더 -->

        <section class="categoryHeader">

            <div class="categoryTitle">기본</div>
            <div class="categoryTitle">학자</div>
            <div class="categoryTitle">커스텀</div>

        </section>

        <!-- 캐릭터 표 -->

        <section class="characterTable">

            <!-- 1행 -->

            <button
                class="characterCard activeCharacter"
                data-name="논리적 분석가"
                data-img="./src/characters/character1.png"
                data-line="그건 말이 안되지 않아? 네 논리에는 허점이 있어."
                data-desc="이 캐릭터는 논리와 근거를 중시하며, 날카로운 질문을 던집니다."
                data-color="#22228C"
            >
                <img src="./src/characters/character1.png">
            </button>

            <button
                class="characterCard"
                data-name="소크라테스"
                data-img="./src/characters/scholar1.png"
                data-line="인간은 왜 존재한다고 생각하는가?"
                data-desc="이 캐릭터는 본질적인 질문을 던지며, 스스로 진실에 도달하도록 돕습니다."
                data-color="#B43131"
            >
                <img src="./src/characters/scholar1.png">
            </button>

            <button
                class="characterCard"
                data-name="활발한 치어리더"
                data-img="./src/characters/custom1.png"
                data-line="오늘은 어떤 책 이야기를 해볼까?"
                data-desc="이 캐릭터는 밝은 에너지로 대화를 이끌며, 편하게 이야기하도록 합니다."
                data-color="#C66A00"
            >
                <img src="./src/characters/custom1.png">
            </button>

            <!-- 2행 -->

            <button
                class="characterCard"
                data-name="비판적 회의론자"
                data-img="./src/characters/character2.png"
                data-line="정말 그렇게 생각해? 난 그렇지 않다고 봐."
                data-desc="이 캐릭터는 상대의 허점을 찾는 것을 즐기며, 각종 의문을 제기합니다."
                data-color="#444444"
            >
                <img src="./src/characters/character2.png">
            </button>

            <button
                class="characterCard"
                data-name="니체"
                data-img="./src/characters/scholar2.png"
                data-line="당연하다고 믿는 것부터 의심해 보게."
                data-desc="이 캐릭터는 고정관념을 비판적으로 보며, 의미를 만드는 것을 중시합니다."
                data-color="#277A1C"
            >
                <img src="./src/characters/scholar2.png">
            </button>

            <button
                class="characterCard"
                data-name="물리학 연구원"
                data-img="./src/characters/custom2.png"
                data-line="이 현상은 어떤 원리로 설명할 수 있을까?"
                data-desc="이 캐릭터는 관찰한 내용을 바탕으로, 논리적이고 과학적인 사고를 합니다."
                data-color="#176377"
            >
                <img src="./src/characters/custom2.png">
            </button>

            <!-- 3행 -->

            <button
                class="characterCard"
                data-name="외교적 중재자"
                data-img="./src/characters/character3.png"
                data-line="만족할 수 있는 합의점을 함께 찾아보자."
                data-desc="이 캐릭터는 갈등이 깊어지는 것을 경계하며, 합의안 도출에 주력합니다."
                data-color="#551763"
            >
                <img src="./src/characters/character3.png">
            </button>

            <button
                class="characterCard"
                data-name="르네 데카르트"
                data-img="./src/characters/scholar3.png"
                data-line="나는 생각한다. 고로 존재한다."
                data-desc="이 캐릭터는 의심과 검증을 통해 쌓아 올리는 논리를 중요시합니다."
                data-color="#7A0A0A"
            >
                <img src="./src/characters/scholar3.png">
            </button>

            <div class="emptyCard"></div>

            <!-- 4행 -->

            <button
                class="characterCard"
                data-name="가치 수호자"
                data-img="./src/characters/character4.png"
                data-line="모든 것은 분명 가치가 있어."
                data-desc="이 캐릭터는 효율이나 논리보다 정의, 공정, 윤리를 최우선으로 합니다."
                data-color="#2D9B4D"
            >
                <img src="./src/characters/character4.png">
            </button>

            <button
                class="characterCard"
                data-name="아이작 뉴턴"
                data-img="./src/characters/scholar4.png"
                data-line="우주의 모든 것이 서로를 끌어 당기고 있군."
                data-desc="이 캐릭터는 세상을 거대한 법칙의 구조물로 바라봅니다."
                data-color="#680707"
            >
                <img src="./src/characters/scholar4.png">
            </button>

            <div class="emptyCard"></div>

            <!-- 5행 -->

            <button
                class="characterCard"
                data-name="지배적 정복자"
                data-img="./src/characters/character5.png"
                data-line="자자, 나를 이겨보실텐가."
                data-desc="이 캐릭터는 토론에서 승리하고 주도권을 잡는 것을 즐깁니다."
                data-color="#AD1D00"
            >
                <img src="./src/characters/character5.png">
            </button>

            <button
                class="characterCard"
                data-name="아인슈타인"
                data-img="./src/characters/scholar5.png"
                data-line="시공간은 절대적이지 않네."
                data-desc="이 캐릭터는 상식을 넘는 상상력과 직관으로 세상을 새롭게 바라봅니다."
                data-color="#555555"
            >
                <img src="./src/characters/scholar5.png">
            </button>

            <div class="emptyCard"></div>

        </section>

        <!-- nav -->

        <nav>

            <a href="./index.html" class="navbarElement">
                <img src="./src/mynaui_home.png"/>
                <p>홈</p>
            </a>

            <a href="./debateStart.html" class="navbarElement">
                <img src="./src/clarity_talk-bubbles-line.png"/>
                <p>대화</p>
            </a>

            <a href="./archive.html" class="navbarElement">
                <img src="./src/hugeicons_book-open-02.png"/>
                <p>독서록</p>
            </a>

            <a class="navbarElement">
                <img src="./src/tabler_man-filled.png"/>
                <p>캐릭터</p>
            </a>

            <a href="./mypage.html" class="navbarElement">
                <img src="./src/weui_me-outlined.png"/>
                <p>마이</p>
            </a>

        </nav>

    </main>

    <script>

        const characterCards = document.querySelectorAll('.characterCard');

        const characterName = document.getElementById('characterName');
        const characterImg = document.getElementById('mainCharacterImg');
        const characterLine = document.getElementById('characterLine');
        const characterDesc = document.getElementById('characterDesc');

        characterCards.forEach(card => {

            if(card.classList.contains('lockedCard')) return;

            card.addEventListener('click', () => {

                document
                    .querySelector('.activeCharacter')
                    ?.classList.remove('activeCharacter');

                card.classList.add('activeCharacter');

                characterName.textContent = card.dataset.name;

                characterImg.src = card.dataset.img;

                characterLine.textContent = card.dataset.line;

                characterDesc.textContent = card.dataset.desc;

                characterName.style.color = card.dataset.color;
                characterLine.style.color = card.dataset.color;

            });

        });

    </script>

</body>
</html>
