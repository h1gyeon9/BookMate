<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style/style.css">
    <link rel="stylesheet" href="./style/mypage.css">
    <title>북메이트 - 마이페이지</title>
</head>
<body>
    <main>

        <section class="profileSection">
            <div class="topBar">
                <a href="./index.html"><img src="./src/back.svg" class="iconBtn" /></a>
            </div>

            <div class="profileBox">
                <img src="./src/lionProfile.png" class="profileImg" />

                <div class="profileText">
                    <h1>책 먹는 사자</h1>
                    <p>chaekmuklion@cau.ac.kr</p>
                </div>
            </div>
        </section>

        <section class="recordSection">

            <div class="recordCard">
                <h2>8권</h2>
                <p>완독했어요!</p>
            </div>

            <div class="recordCard">
                <h2>7권</h2>
                <p>독서록을 남겼어요!</p>
            </div>

            <div class="recordCard">
                <h2>450분</h2>
                <p>토론했어요!</p>
            </div>

        </section>

        <section class="calendarSection">

            <div class="monthRow">
                <div class="month">
                    <p>1월</p>

                    <div class="calendarGrid">
                        <div></div><div></div><div></div><div></div>
                        <div></div><div class="active"></div><div></div><div></div>
                        <div></div><div></div><div></div><div></div>
                        <div></div><div></div><div></div><div></div>
                    </div>
                </div>

                <div class="month">
                    <p>2월</p>

                    <div class="calendarGrid">
                        <div></div><div></div><div></div><div></div>
                        <div></div><div></div><div class="active"></div><div></div>
                        <div></div><div></div><div></div><div></div>
                        <div class="active"></div><div></div><div></div><div></div>
                    </div>
                </div>

                <div class="month">
                    <p>3월</p>

                    <div class="calendarGrid">
                        <div></div><div></div><div></div><div></div>
                        <div></div><div></div><div></div><div></div>
                        <div></div><div class="active"></div><div></div><div></div>
                        <div></div><div></div><div></div><div></div>
                    </div>
                </div>

                <div class="month">
                    <p>4월</p>

                    <div class="calendarGrid">
                        <div></div><div class="active"></div><div></div><div></div>
                        <div></div><div></div><div></div><div></div>
                        <div></div><div></div><div></div><div></div>
                        <div></div><div class="active"></div><div></div><div></div>
                    </div>
                </div>

                <div class="month">
                    <p>5월</p>

                    <div class="calendarGrid">
                        <div></div><div></div><div></div><div></div>
                        <div></div><div class="active"></div><div></div><div></div>
                        <div></div><div></div><div></div><div></div>
                        <div class="active"></div><div></div><div></div><div></div>
                    </div>
                </div>
            </div>

            <div class="levelBox">
                <div class="level active"></div>
                <div class="level low"></div>
                <div class="level"></div>
            </div>

        </section>

        <section class="messageSection">

            <div class="speechBubble">
                <p>작년보다 3권 더 읽었어요!<br>화이팅 !!</p>
            </div>

            <img src="./src/girl.png" class="girlImg" />

        </section>

        <section class="bookStatus">

            <div class="status activeStatus">읽고 싶은 6</div>
            <div class="status">읽는 중 2</div>
            <div class="status">다 읽은 8</div>

        </section>

        <section class="bookListSection">

            <div class="sortBox">
                <p>최근 추가순</p>
            </div>

            <div class="bookList">

                <img src="./src/book1.png" />
                <img src="./src/book2.png" />
                <img src="./src/book3.png" />

            </div>

        </section>

        <nav>

            <a href="./index.html" class="navbarElement">
                <img src="./src/mynaui_home.png"/>
                <p>홈</p>
            </a>

            <a class="navbarElement">
                <img src="./src/clarity_talk-bubbles-line.png"/>
                <p>대화</p>
            </a>

            <a href="./archive.html" class="navbarElement">
                <img src="./src/hugeicons_book-open-02.png"/>
                <p>독서록</p>
            </a>

            <a href="./character.html" class="navbarElement">
                <img src="./src/tabler_man-filled.png"/>
                <p>캐릭터</p>
            </a>

            <a class="navbarElement">
                <img src="./src/weui_me-outlined.png"/>
                <p>마이</p>
            </a>

        </nav>

    </main>
</body>
</html>
